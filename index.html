<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>La Faluche — archive du folklore faluchard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1b1512; --bordeaux:#7B2D26; --bordeaux-deep:#581c18; --gold:#a9842f;
  --paper:#f4f1ec; --paper2:#fbfaf7; --rule:#ddd3c5; --muted:#6e6053; --text:#23201d;
  --r1:#b23a33; --r2:#6e4e8e; --r3:#2e7d5b; --r4:#c9a227; --r5:#2f5c8e; --r6:#c9702a; --r7:#bf6a9c;
  --serif:'Spectral',Georgia,'Times New Roman',serif;
  --sans:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}}
body{margin:0;background:var(--paper);color:var(--text);font-family:var(--sans);font-size:16px;line-height:1.62;-webkit-font-smoothing:antialiased}
a{color:var(--bordeaux);text-decoration-color:var(--rule);text-underline-offset:2px}
.ribbon{height:6px;display:flex}
.ribbon span{flex:1}
.ribbon i:nth-child(1){background:var(--r1)}
.ribbon span:nth-child(1){background:var(--r1)}.ribbon span:nth-child(2){background:var(--r2)}.ribbon span:nth-child(3){background:var(--r3)}.ribbon span:nth-child(4){background:var(--r4)}.ribbon span:nth-child(5){background:var(--r5)}.ribbon span:nth-child(6){background:var(--r6)}.ribbon span:nth-child(7){background:var(--r7)}

/* HERO */
header.hero{background:linear-gradient(160deg,#241a16,#0f0b09);color:#efe7da;position:relative;overflow:hidden}
.hero-in{max-width:1180px;margin:0 auto;padding:54px 28px 40px;display:flex;gap:34px;align-items:center}
.hero h1{font-family:var(--serif);font-weight:700;font-size:clamp(40px,6vw,68px);line-height:.98;margin:0 0 8px;letter-spacing:-.01em}
.hero h1 em{font-style:italic;color:var(--gold)}
.hero p.sub{font-size:18px;color:#cdbfae;margin:0 0 22px;max-width:46ch}
.hero .meta{font-family:var(--sans);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin:0 0 18px}
.falu{flex:0 0 150px}
.search{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.16);border-radius:10px;padding:11px 14px;max-width:420px}
.search input{flex:1;background:none;border:0;color:#fff;font-size:15px;font-family:var(--sans);outline:none}
.search input::placeholder{color:#b6a895}
.search svg{flex:0 0 18px;opacity:.7}
#count{font-size:12.5px;color:var(--gold);margin-top:8px;min-height:1em}

/* LAYOUT */
.wrap{max-width:1180px;margin:0 auto;padding:0 28px;display:grid;grid-template-columns:230px 1fr;gap:40px;align-items:start}
nav.toc{position:sticky;top:18px;padding:26px 0;align-self:start}
nav.toc ol{list-style:none;margin:0;padding:0;counter-reset:s}
nav.toc li{counter-increment:s}
nav.toc a{display:block;padding:7px 12px 7px 0;color:var(--muted);text-decoration:none;font-size:14px;border-left:2px solid transparent;padding-left:14px;transition:.15s}
nav.toc a::before{content:counter(s,decimal-leading-zero);color:var(--gold);font-family:var(--serif);font-size:12px;margin-right:9px}
nav.toc a:hover{color:var(--bordeaux)}
nav.toc a.active{color:var(--bordeaux);border-left-color:var(--bordeaux);font-weight:600}
main{padding:30px 0 80px;min-width:0}

/* SECTIONS */
article.section{margin:0 0 46px;scroll-margin-top:18px}
article.section>h2{font-family:var(--serif);font-weight:700;font-size:30px;color:var(--bordeaux);margin:0 0 4px;letter-spacing:-.01em}
article.section>.eyebrow{font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin:0 0 14px;display:flex;align-items:center;gap:8px}
article.section>.eyebrow::after{content:"";height:1px;flex:1;background:var(--rule)}
h3.sub{font-family:var(--serif);font-weight:600;font-size:20px;color:var(--ink);margin:26px 0 8px}
p{margin:0 0 12px}
ul{margin:0 0 14px;padding-left:20px}
li{margin:3px 0}
.note{background:var(--paper2);border:1px solid var(--rule);border-left:3px solid var(--gold);border-radius:6px;padding:11px 15px;font-size:14.5px;color:var(--muted);margin:0 0 16px}
code{background:#eee7dc;padding:1px 5px;border-radius:4px;font-size:13px}

/* KV */
dl.kv{margin:0 0 16px;border-top:1px solid var(--rule)}
.kv-row{display:grid;grid-template-columns:minmax(150px,230px) 1fr;gap:16px;padding:9px 4px;border-bottom:1px solid var(--rule)}
.kv-row dt{font-weight:600;color:var(--bordeaux-deep)}
.kv-row dd{margin:0;color:var(--text)}
@media(max-width:560px){.kv-row{grid-template-columns:1fr;gap:2px}}

/* TABLES */
.tablewrap{overflow-x:auto;margin:0 0 18px;border:1px solid var(--rule);border-radius:8px}
table{border-collapse:collapse;width:100%;font-size:14px}
thead th{background:var(--bordeaux);color:#fff;text-align:left;padding:9px 11px;font-weight:600;font-size:13px;position:sticky;top:0}
tbody td{padding:8px 11px;border-top:1px solid var(--rule);vertical-align:top}
tbody tr:nth-child(even){background:var(--paper2)}
td.c0{font-weight:600;color:var(--bordeaux-deep);white-space:nowrap}
.tablewrap.wide table{min-width:760px}

/* ACCORDION */
.accordion{border:1px solid var(--rule);border-radius:8px;overflow:hidden;background:var(--paper2)}
details.acc{border-bottom:1px solid var(--rule)}
details.acc:last-child{border-bottom:0}
details.acc>summary{list-style:none;cursor:pointer;padding:12px 16px;display:flex;flex-direction:column;gap:2px}
details.acc>summary::-webkit-details-marker{display:none}
details.acc>summary:hover{background:#f0ebe2}
.acc-t{font-family:var(--serif);font-weight:600;font-size:17px;color:var(--bordeaux);position:relative;padding-left:20px}
.acc-t::before{content:"▸";position:absolute;left:0;color:var(--gold);transition:.15s;font-size:13px;top:3px}
details.acc[open] .acc-t::before{transform:rotate(90deg)}
.acc-s{font-size:13.5px;color:var(--muted);padding-left:20px}
.acc-body{padding:4px 18px 18px}
.acc-body h3.sub{font-size:16px;margin:14px 0 5px}

.hidden{display:none!important}
footer{background:var(--ink);color:#b6a895;font-size:13px;text-align:center;padding:26px 20px}
footer .ribbon{margin:-26px -20px 20px}

@media(max-width:880px){
  .wrap{grid-template-columns:1fr;gap:0}
  nav.toc{position:static;padding:14px 0;border-bottom:1px solid var(--rule);overflow-x:auto}
  nav.toc ol{display:flex;gap:4px}
  nav.toc a{white-space:nowrap;border-left:0;border-bottom:2px solid transparent;padding:6px 10px}
  nav.toc a.active{border-left:0;border-bottom-color:var(--bordeaux)}
  .hero-in{flex-direction:column;align-items:flex-start;gap:18px;padding:38px 22px 30px}
  .falu{flex:none}
}
</style>
</head>

          "t": "h3",

        },
        {
          "t": "p",
          "html": "Au sortir de la défaite de 1870, un sursaut traverse la jeunesse universitaire. Les lois de 1883-1884 autorisent les associations : les Associations générales d'étudiants (AGE) se structurent ville par ville. La plus médiatisée est l'« A » de Paris (vers 1884-1885). En 1884, un article injurieux du <em>Cri du peuple</em> provoque des manifestations d'où naît l'« A » ; ses premiers présidents sont Boureau puis Delcambre, sous le patronage du recteur Gérard et du professeur Lavisse."

          "t": "h3",
          "text": "Bologne 1888 : le mythe et la réalité"
        },
        {
          "t": "p",
          "html": "En juin 1888, l'Université de Bologne fête ses huit cents ans ; une délégation française (six Parisiens, deux Marseillais) y représente l'« A ». On lui offre l'<em>orsina</em>, petit bonnet de velours, porté le seul temps du voyage. Contrairement à la légende du code, le béret n'a pas été rapporté de Bologne : Guy Daniel a fixé la date de 1888, mais Segura (2012) et « Scatman » ont montré que l'orsina n'a fait qu'inspirer l'idée — le béret est une invention française."
        },
        {
          "t": "p",
          "html": "Le récit de Lavisse est éloquent : arrivée le dimanche 10 juin 1888, les Français en simple chapeau face aux Allemands à plumets et rapières, accueil délirant (drapeau embrassé, chevaux dételés), le roi Humbert Ier saluant la bannière française. Ces fêtes masquaient une manœuvre politique de Crispi (anniversaire de la libération de 1859, statue de Victor-Emmanuel)."
        },
        {
          "t": "h3",
          "text": "La naissance française du béret (1888-1889)"
        },
        {
          "t": "p",
          "html": "Le béret de 1888 « restaure » un ancien béret rouge de l'étudiant bohème (années 1830-1870). Le 20 décembre 1888, l'« A » officialise au théâtre Beaumarchais un béret violet à liseré de faculté ; première apparition au Quartier latin le 15 janvier 1889. Après la « bérétomanie » et l'arrêté préfectoral du 9 février, le modèle définitif est fixé le 31 mars 1889 (velours noir, ruban bleu-rouge de Paris, écusson et palmes), jour de l'inauguration de la Tour Eiffel."
        },
        {
          "t": "h3",
          "text": "La diffusion en province (1889-1891)"
        },
        {
          "t": "p",
          "html": "Aix officialise sa coiffe le 16 février 1889 ; Montpellier choisit début 1889 la toque à crevés (hommage à Rabelais), conservée jusqu'à aujourd'hui ; Lyon (lion brodé), Toulouse, Nancy, Bordeaux suivent. Les insignes et l'étoile annuelle viennent de Gand (Belgique), vers 1900. Le mot « faluche » (galette, en patois lillois) s'impose dans les années 1930."
        },
        {
          "t": "h3",
          "text": "L'âge d'or international : Corda Fratres et l'UNEF"
        },
        {
          "t": "p",
          "html": "Dès le 10 août 1889, une conférence à Paris lance une fédération internationale des étudiants, qui devient la <em>Corda Fratres</em> (1898), forte de dizaines de milliers de membres sur cinq continents (français langue officielle ; 2e congrès à Paris en 1900, présidé en faluche ; 5e à Bordeaux en 1907). La même année 1907, Bordeaux, Dijon, Lille et Lyon fondent l'UNAGEF à Lille (ancêtre de l'UNEF) ; Paris les rejoint en 1909. Structure associative, le droit syndical (1884) étant réservé aux salariés."
        },
        {
          "t": "h3",
          "text": "Strasbourg et l'Alsace (1909)"
        },
        {
          "t": "p",
          "html": "L'Alsace étant allemande, des pharmaciens alsaciens (H2S) rapportent en 1909 la faluche de Nancy, en signe de francophilie — d'où les passants strasbourgeois. À la Libération de 1918, ce sont eux qui réaffichent les premiers la faluche."
        },
        {
          "t": "h3",
          "text": "Les deux guerres mondiales"
        },
        {
          "t": "p",
          "html": "1914-1918 décime la jeunesse étudiante ; la faluche hérite des insignes militaires de spécialité. Après la crise de 1929, elle renaît au cinquantenaire (avril 1938, semaine de liesse au Quartier latin). Le 11 novembre 1940, étudiants et lycéens manifestent à Paris ; l'Université de Strasbourg, repliée à Clermont-Ferrand, subit la rafle du 25 novembre 1943 (≈130 déportés)."
        },
        {
          "t": "h3",
          "text": "Charte de Grenoble, Mai 68 et renouveau"
        },
        {
          "t": "p",
          "html": "La Charte de Grenoble (24 avril 1946) définit l'étudiant comme « un jeune travailleur intellectuel » ; le premier code écrit paraît la même année (AFGES). Mai 68 rejette la faluche, qui ne survit que dans les filières corporatistes et devient une « tradition » (article 0 : apolitique, asyndicale, aconfessionnelle). Le renouveau vient des Basochards de Poitiers et des canulars de « Didier Ier » (1976-79), puis de la fusion des codes à Lille (1976), du centenaire de Reims (1988) et des États Généraux de Dijon (1989)."
        },
        {
          "t": "h3",
          "text": "Le code : de l'oral à l'écrit"
        },
        {
          "t": "p",
          "html": "Longtemps oral, le code est transcrit dans les années 1960 (code toulousain du <em>Midi Étudiant</em>, mars 1966 ; code lillois du <em>MIL</em>, 1975-76), puis fondu en une synthèse nationale le 8 mars 1976 (base toulousaine). Certaines formules ont traversé les décennies : l'interdiction de « transformer la faluche en comptoir de quincaillerie » (1966) est devenue « une succursale de Monoprix » (article III, 2023), et l'article IV est resté identique. La rédaction actuelle (135e, Belfort 2023) compte une trentaine de filières, intègre la réforme PASS/LAS et réduit le bac à un simple Ɣ."
        }

        {
          "t": "p",
          "html": "Moine, médecin (Montpellier 1530, Hôtel-Dieu de Lyon), humaniste, auteur de <em>Pantagruel</em> et <em>Gargantua</em> sous l'anagramme Alcofribas Nasier. Il incarne l'esprit faluchard : savoir, convivialité, vin et paillardise. De lui vient « le quart d'heure de Rabelais »."

        },
        {
          "t": "h3",
          "text": "L'origine du potager"
        },
        {
          "t": "p",
          "html": "La tradition relie le potager aux « logeuses » : la soupe à base de pommes de terre (absentes du potager), les autres légumes apportés par les étudiants, qui codaient leurs aventures par un légume. On a longtemps cité un passage de la revue <em>Scapin</em> (1933) comme plus ancienne trace, mais Segura l'a corrigé : le « poireau » y désigne une décoration (palmes académiques), non l'insigne intime. La codification du potager est plus tardive (code carabin toulousain, fin des années 1960)."
        }
      ]

      "title": "Sources",
      "blocks": [
        {
          "t": "list",
          "items": [
            "<strong>Primaires</strong> : Ernest Lavisse, <em>Études et étudiants</em> (1890 ; BnF/Gallica, ARK bpt6k5740418v) ; presse de 1888-1889 ; revue <em>Scapin</em> (Poitiers) ; Georges Dillemann, « Réapparition de la faluche » (Revue d'histoire de la pharmacie, 1988 ; Persée).",
            "<strong>Travaux savants</strong> : Guy Daniel (thèse, 1990) ; Manuel Segura (mémoire 1994 ; étude 2012) ; Isabelle Fayemendy (mémoire, 2009-2010).",
            "<strong>Corpus communautaire</strong> : codes nationaux (1966-2023), présentation des Grands Archivistes, « Les Insignes Décernables », étude de Rémy Pamart sur les caducées, faluche.info, codes de ville."
          ]
        },
        {
          "t": "note",
          "html": "Compilation à but documentaire. Les usages varient selon les communautés et les époques."
        }
      ]
    }
  ]
};
</script>
<script>
(function(){
  var D = window.FALUCHE_DATA || {sections:[]};
  function esc(s){return s;}
  function block(b, inAcc){
    var sc = inAcc ? "" : " searchable";
    switch(b.t){
      case "p":    return '<p class="'+sc.trim()+'">'+b.html+'</p>';
      case "h3":   return '<h3 class="sub">'+b.text+'</h3>';
      case "note": return '<div class="note'+sc+'">'+b.html+'</div>';
      case "list": return '<ul>'+b.items.map(function(i){return '<li class="'+sc.trim()+'">'+i+'</li>';}).join('')+'</ul>';
      case "kv":   return '<dl class="kv">'+b.items.map(function(p){return '<div class="kv-row'+sc+'"><dt>'+p[0]+'</dt><dd>'+p[1]+'</dd></div>';}).join('')+'</dl>';
      case "table":return '<div class="tablewrap'+(b.wide?' wide':'')+'"><table><thead><tr>'+b.head.map(function(h){return '<th>'+h+'</th>';}).join('')+'</tr></thead><tbody>'+
                   b.rows.map(function(r){return '<tr class="'+sc.trim()+'">'+r.map(function(c,k){return '<td'+(k===0?' class="c0"':'')+'>'+c+'</td>';}).join('')+'</tr>';}).join('')+'</tbody></table></div>';
      case "accordion": return '<div class="accordion">'+b.items.map(function(it){
                   return '<details class="acc searchable"><summary><span class="acc-t">'+it.title+'</span>'+(it.sub?'<span class="acc-s">'+it.sub+'</span>':'')+'</summary><div class="acc-body">'+it.blocks.map(function(bb){return block(bb,true);}).join('')+'</div></details>';}).join('')+'</div>';
      default: return '';
    }
  }
  // header
  document.getElementById('title').innerHTML = D.title || '';
  document.getElementById('subtitle').textContent = D.subtitle || '';
  document.getElementById('meta').textContent = D.updated || '';
  document.title = (D.title||'')+' — archive';
  // nav + sections
  var nav = document.getElementById('nav'), main = document.getElementById('main');
  D.sections.forEach(function(s){
    nav.insertAdjacentHTML('beforeend','<li><a href="#'+s.id+'">'+s.title+'</a></li>');
    var html = '<article class="section" id="'+s.id+'"><div class="eyebrow">Section</div><h2>'+s.title+'</h2>'+
               (s.intro?'<p class="searchable">'+s.intro+'</p>':'')+ s.blocks.map(function(b){return block(b,false);}).join('') +'</article>';
    main.insertAdjacentHTML('beforeend', html);
  });
  document.getElementById('foot').innerHTML = (D.title||'')+' · archive documentaire · '+(D.updated||'')+' — contenu éditable dans le bloc de données en tête de fichier.';

  // search
  var q = document.getElementById('q'), count = document.getElementById('count');
  function norm(s){return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
  function run(){
    var v = norm(q.value.trim()); var total=0;
    document.querySelectorAll('article.section').forEach(function(sec){
      var hit=false;
      sec.querySelectorAll('.searchable').forEach(function(n){
        var m = v==='' || norm(n.textContent).indexOf(v)>-1;
        n.classList.toggle('hidden', !m);
        if(m){hit=true; total++;}
        if(n.classList.contains('acc')){ n.open = (v!=='' && m); }
      });
      sec.classList.toggle('hidden', v!=='' && !hit);
      var link = document.querySelector('nav.toc a[href="#'+sec.id+'"]');
      if(link) link.parentElement.classList.toggle('hidden', v!=='' && !hit);
    });
    count.textContent = v==='' ? '' : (total ? total+' résultat'+(total>1?'s':'') : 'Aucun résultat');
  }
  q.addEventListener('input', run);

  // scrollspy
  var links = [].slice.call(document.querySelectorAll('nav.toc a'));
  var obs = new IntersectionObserver(function(es){
    es.forEach(function(e){ if(e.isIntersecting){
      links.forEach(function(l){l.classList.toggle('active', l.getAttribute('href')==='#'+e.target.id);});
    }});
  },{rootMargin:'-20% 0px -70% 0px'});
  document.querySelectorAll('article.section').forEach(function(s){obs.observe(s);});
})();
</script>
</body>
</html>
