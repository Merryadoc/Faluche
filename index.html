<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>La Faluche — archive du folklore faluchard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#160a09; --bordeaux:#7B2D26; --bordeaux-deep:#581c18; --gold:#a9842f;
  --paper:#f4f1ec; --paper2:#fbfaf7; --rule:#ddd3c5; --muted:#6e6053; --text:#23201d;
  --r1:#b23a33; --r2:#6e4e8e; --r3:#2e7d5b; --r4:#c9a227; --r5:#2f5c8e; --r6:#c9702a; --r7:#bf6a9c;
  --serif:'Spectral',Georgia,'Times New Roman',serif;
  --sans:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}}
body{margin:0;background:var(--paper);color:var(--text);font-family:var(--sans);font-size:16px;line-height:1.62;-webkit-font-smoothing:antialiased}
a{color:var(--bordeaux);text-underline-offset:2px}
.ribbon{height:6px;display:flex}
.ribbon span{flex:1}
.ribbon span:nth-child(1){background:var(--r1)}.ribbon span:nth-child(2){background:var(--r2)}.ribbon span:nth-child(3){background:var(--r3)}.ribbon span:nth-child(4){background:var(--r4)}.ribbon span:nth-child(5){background:var(--r5)}.ribbon span:nth-child(6){background:var(--r6)}.ribbon span:nth-child(7){background:var(--r7)}

header.hero{position:relative;color:#f0e3d6;
  background:linear-gradient(155deg,#9c0b0a 0%, #2a0d0b 45%, #120605 100%);}
header.hero::after{content:"";position:absolute;inset:0;opacity:.06;pointer-events:none;}
.hero-in{position:relative;max-width:1180px;margin:0 auto;padding:58px 28px 42px}
.hero h1{font-family:var(--serif);font-weight:700;font-size:clamp(42px,6.4vw,72px);line-height:.98;margin:0 0 10px;letter-spacing:-.01em}
.hero h1 em{font-style:italic;color:var(--gold)}
.hero p.sub{font-size:18px;color:#d8c6b4;margin:0 0 22px;max-width:52ch}
.hero .meta{font-family:var(--sans);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin:0 0 16px}
.search{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.06);border:1px solid rgba(214,180,150,.28);border-radius:10px;padding:11px 14px;max-width:440px}
.search input{flex:1;background:none;border:0;color:#fff;font-size:15px;font-family:var(--sans);outline:none}
.search input::placeholder{color:#b9a690}
.search svg{flex:0 0 18px}
#count{font-size:12.5px;color:var(--gold);margin-top:8px;min-height:1em}

.wrap{max-width:1180px;margin:0 auto;padding:0 28px;display:grid;grid-template-columns:230px 1fr;gap:40px;align-items:start}
nav.toc{position:sticky;top:18px;padding:26px 0;align-self:start}
nav.toc ol{list-style:none;margin:0;padding:0;counter-reset:s}
nav.toc li{counter-increment:s}
nav.toc a{display:block;color:var(--muted);text-decoration:none;font-size:14px;border-left:2px solid transparent;padding:7px 12px 7px 14px;transition:.15s}
nav.toc a::before{content:counter(s,decimal-leading-zero);color:var(--gold);font-family:var(--serif);font-size:12px;margin-right:9px}
nav.toc a:hover{color:var(--bordeaux)}
nav.toc a.active{color:var(--bordeaux);border-left-color:var(--bordeaux);font-weight:600}
main{padding:30px 0 80px;min-width:0}

article.section{margin:0 0 50px;scroll-margin-top:18px}
article.section>h2{font-family:var(--serif);font-weight:700;font-size:31px;color:var(--bordeaux);margin:0 0 4px;letter-spacing:-.01em}
article.section>.eyebrow{font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin:0 0 16px;display:flex;align-items:center;gap:8px}
article.section>.eyebrow::after{content:"";height:1px;flex:1;background:var(--rule)}
h3.sub{font-family:var(--serif);font-weight:600;font-size:21px;color:var(--ink);margin:28px 0 9px}
p{margin:0 0 13px}
ul{margin:0 0 14px;padding-left:20px}
li{margin:3px 0}
.note{background:var(--paper2);border:1px solid var(--rule);border-left:3px solid var(--gold);border-radius:6px;padding:11px 15px;font-size:14.5px;color:var(--muted);margin:0 0 16px}
code{background:#eee7dc;padding:1px 5px;border-radius:4px;font-size:13px}

figure.fig{background:var(--paper2);border:1px solid var(--rule);border-radius:12px;overflow:hidden;box-shadow:0 6px 22px rgba(40,20,15,.10);margin:8px 0 18px}
figure.fig img{display:block;width:100%;max-height:430px;object-fit:cover;background:#efe9df}
figure.fig figcaption{font-size:12.5px;color:var(--muted);padding:10px 14px;line-height:1.45;border-top:2px solid var(--gold)}
figure.fig .cred{display:block;margin-top:3px;color:#a89a89;font-style:italic;font-size:11.5px}
figure.fig.fig-center{margin-left:auto;margin-right:auto;max-width:460px}
figure.fig.fig-wide{margin:14px auto;max-width:780px}
figure.fig.fig-right{float:right;width:320px;margin:6px 0 16px 28px}
figure.fig.fig-left{float:left;width:320px;margin:6px 28px 16px 0}
figure.fig.fig-right img,figure.fig.fig-left img{max-height:320px}
h3.sub{clear:both}
article.section::after{content:"";display:block;clear:both}
@media(max-width:680px){figure.fig.fig-right,figure.fig.fig-left{float:none;width:auto!important;margin:8px 0 18px}}
.imgrow{display:flex;gap:16px;flex-wrap:wrap;margin:16px 0 22px;clear:both;justify-content:center}
.imgrow figure.fig{flex:1 1 160px;max-width:220px;margin:0;box-shadow:none}
.imgrow figure.fig img{max-height:150px;object-fit:contain;padding:18px;background:#fff}
.imgrow figure.fig figcaption{text-align:center;border-top:1px solid var(--rule);font-weight:500}

dl.kv{margin:0 0 16px;border-top:1px solid var(--rule);clear:both}
.kv-row{display:grid;grid-template-columns:minmax(160px,240px) 1fr;gap:16px;padding:9px 4px;border-bottom:1px solid var(--rule)}
.kv-row dt{font-weight:600;color:var(--bordeaux-deep)}
.kv-row dd{margin:0}
@media(max-width:560px){.kv-row{grid-template-columns:1fr;gap:2px}}

.tablewrap{overflow-x:auto;margin:0 0 18px;border:1px solid var(--rule);border-radius:8px;clear:both}
table{border-collapse:collapse;width:100%;font-size:14px}
thead th{background:var(--bordeaux);color:#fff;text-align:left;padding:9px 11px;font-weight:600;font-size:13px}
tbody td{padding:8px 11px;border-top:1px solid var(--rule);vertical-align:top}
tbody tr:nth-child(even){background:var(--paper2)}
td.c0{font-weight:600;color:var(--bordeaux-deep);white-space:nowrap}
.tablewrap.wide table{min-width:760px}

.accordion{border:1px solid var(--rule);border-radius:8px;overflow:hidden;background:var(--paper2);clear:both}
details.acc{border-bottom:1px solid var(--rule)}
details.acc:last-child{border-bottom:0}
details.acc>summary{list-style:none;cursor:pointer;padding:12px 16px;display:flex;flex-direction:column;gap:2px}
details.acc>summary::-webkit-details-marker{display:none}
details.acc>summary:hover{background:#f0ebe2}
.acc-t{font-family:var(--serif);font-weight:600;font-size:17px;color:var(--bordeaux);position:relative;padding-left:20px}
.acc-t::before{content:"\25B8";position:absolute;left:0;color:var(--gold);transition:.15s;font-size:13px;top:3px}
details.acc[open] .acc-t::before{transform:rotate(90deg)}
.acc-s{font-size:13.5px;color:var(--muted);padding-left:20px}
.acc-body{padding:4px 18px 18px}
.acc-body h3.sub{font-size:16px;margin:14px 0 5px}

.hidden{display:none!important}
footer{background:linear-gradient(0deg,#0e0504,#1c0b0a);color:#c7b4a2;font-size:13px;text-align:center;padding:30px 20px}
footer .ribbon{margin:-30px -20px 22px}

@media(max-width:880px){
  .wrap{grid-template-columns:1fr;gap:0}
  nav.toc{position:static;padding:14px 0;border-bottom:1px solid var(--rule);overflow-x:auto}
  nav.toc ol{display:flex;gap:4px}
  nav.toc a{white-space:nowrap;border-left:0;border-bottom:2px solid transparent;padding:6px 10px}
  nav.toc a.active{border-left:0;border-bottom-color:var(--bordeaux)}
  .hero-in{padding:40px 22px 32px}
}
</style>

<script>window.FALUCHE_DATA = {
  "title": "La Faluche",
  "subtitle": "Archive du folklore faluchard — Histoire, insignes, villes...",
  "sections": [
    {
      "id": "apropos",
      "title": "À propos",
      "blocks": [
        {
          "t": "p",
          "html": "Cette archive rassemble l'ensemble du travail documentaire mené sur la faluche : récit historique, édition diachronique, catalogue d'insignes, particularités des villes et lexique."
        },
        {
          "t": "note",
          "html": "La faluche est vivante : insignes, codes et usages varient d'une ville à l'autre et évoluent. Les informations ci-dessous donnent le sens le plus répandu, sourcé autant que possible."
        }
      ]
    },
    {
      "id": "histoire",
      "title": "Histoire",
      "blocks": [
        {
          "t": "h3",
          "text": "Une histoire qui a failli se perdre"
        },
        {
          "t": "p",
          "html": "Le folklore faluchard naît de la coiffe, mais l'histoire de ce béret n'a rien d'un long fleuve tranquille : transmise d'abord oralement, malmenée par 2 guerres mondiales puis reniée après Mai 68, elle a bien failli disparaître, au point que pendant près d'un siècle son origine bolognaise ne fut qu'une hypothèse parmi d'autres. Ce sont les recherches de Guy Daniel, dans sa thèse de médecine soutenue à Lille en 1990, qui ont redonné une assise historique à ces origines ; l'étude de Manuel Segura (<em>De l'origine du béret ou les tribulations d'une galette pas comme les autres</em>, 2012) et les travaux de Pierre Blaignon-Perbet, dit « Scatman », les ont ensuite précisées et corrigées. Le récit qui suit s'appuie sur cette tradition de recherche, telle que l'ont synthétisée les Grands Archivistes de la Faluche."
        },
        {
          "t": "h3",
          "text": "Le monde étudiant de la fin du XIXe siècle"
        },
        {
          "t": "p",
          "html": "Au sortir de la guerre franco-prussienne de 1870, perdue par la France avec l'Alsace-Lorraine, un sursaut d'orgueil traverse la jeunesse universitaire, particulièrement à Paris. La IIIe République, par les lois de 1883-1884 sur les associations et les syndicats, autorise officiellement des groupements étudiants dont certains existaient déjà. Les Associations Générales d'Etudiants (AGE) se structurent alors ville par ville, sur le modèle des clubs britanniques : on y débat, on y philosophe et on organise bals, galas et œuvres de bienfaisance. La plus grande et la plus médiatisée est l'Association générale des étudiants de Paris, fondée vers 1884-1885 et vite surnommée « l'A ». Très tôt, ces associations généralistes se déclinent en corporations de filière et donnent naissance à des fédérations nationales, dont l'UNAGEF, future UNEF."
        },
        {
          "t": "p",
          "html": "L'étincelle est presque fortuite. En 1884, un article du <em>Cri du peuple</em> raille l'étudiant — réduit à « une indécence de babouin greffée sur une bêtise de rhinocéros » — et déclenche manifestations et bagarres. C'est dans les réunions qui suivent que se constitue l'« A », avec pour noyau quelques élèves de l'école de médecine. Présidée par Boureau puis par Delcambre, elle reçoit le patronage du recteur Gérard et la présidence d'honneur de l'historien Ernest Lavisse."
        },
        {
          "t": "h3",
          "text": "Bologne 1888 : le mythe et la réalité"
        },
        {
          "t": "p",
          "html": "Le code affirme traditionnellement que le béret fut « ramené de Bologne en juin 1888 » par une délégation française jalouse des coiffes italiennes, belges et allemandes. La réalité est plus subtile. En juin 1888, l'Université de Bologne fête ses huit cents ans et se voit reconnue comme la plus ancienne université du monde. L'« A » de Paris y envoie une délégation — six Parisiens, auxquels « Scatman » ajoute deux Marseillais — dans le sillage de Lavisse, membre honoraire de l'association et témoin privilégié des fêtes."
        },
        {
          "t": "p",
          "html": "Entre 1886 et 1889, la France s'enflamme pour le général Georges Boulanger, éphémère ministre de la Guerre que sa posture martiale et ouvertement anti-allemande a rendu très populaire. Surnommé « général Revanche », il cristallise le désir de revanche contre l'Allemagne. C'est dans cet air de revanche que la délégation parisienne croise à Bologne les étudiants de Heidelberg et de Strasbourg — alors ville allemande : l'enthousiasme des Bolonais pour le drapeau français, embrassé aux cris de « Vive la France ! », y prend une portée politique qui déborde de loin la simple fête universitaire."
        },
        {
          "t": "p",
          "html": "Le récit qu'en laisse Lavisse est éloquent. La délégation parisienne entre en gare de Bologne le dimanche 10 juin 1888 vers cinq heures, en simple chapeau et petit veston, là où les Allemands paradent en bonnets de velours à plumets et longues rapières. Mais le drapeau tricolore frappé des armes de l'Université de Paris suffit à déclencher l'enthousiasme : les Bolonais en embrassent la hampe, crient « Vive la France ! » et dételent les chevaux pour tirer eux-mêmes la voiture française. Le lendemain, à l'entrée du roi Humbert Ier, c'est la bannière française qui ouvre le cortège, le président de l'« A », M. Chaumeton, ayant été salué par le souverain en personne."
        },
        {
          "t": "p",
          "html": "Se sentant « pauvres » dans leurs habits sombres, les Français se voient offrir par leurs hôtes l'<em>orsina</em> : un petit bonnet de soie ou de velours, décliné en couleurs selon la discipline et inspiré de représentations médiévales d'escholiers. Mais ils ne le portent que le temps du voyage, et seuls les membres de la délégation le conservent, en souvenir."
        },
        {
          "t": "h3",
          "text": "La naissance française du béret (1888-1889)"
        },
        {
          "t": "img",
          "src": "https://commons.wikimedia.org/wiki/Special:FilePath/Eiffel%20Tower%201889-03-12.jpg",
          "alt": "La Tour Eiffel en construction, mars 1889",
          "caption": "La Tour Eiffel en mars 1889 : c'est le jour de son inauguration, le 31 mars 1889, que l'« A » de Paris fixa le modèle définitif du béret étudiant.",
          "credit": "Wikimedia Commons",
          "align": "right",
          "width": 300
        },
        {
          "t": "p",
          "html": "La délégation rentre par étapes depuis l'Italien passant par Marseille, Aix et Lyon. Partout elle est accueillie en ambassadrice de la jeunesse universitaire ; sur son passage germe l'idée de créer des AGE pour imiter Paris. Elle arrive dans la capitale le 25 juin 1888 et défile en grand monôme depuis la gare de Lyon. Le béret qui s'annonce n'est d'ailleurs pas tout à fait une nouveauté : plus d'une vingtaine de sources, des années 1830 à 1870, évoquent déjà un « béret rouge » porté par l'étudiant bohème du Quartier latin, signe de sa fibre républicaine. La presse de 1889 parlera moins d'une création que d'une « restauration » de l'antique béret estudiantin."
        },
        {
          "t": "p",
          "html": "Après l'été, l'idée d'une coiffe commune mûrit. Le jeudi 20 décembre 1888, au théâtre Beaumarchais, l'« A » officialise le béret comme coiffe des étudiants. Il est alors violet, en « drap d'archevêque », orné d'un liseré dont la couleur indique la faculté : jaune pour les lettres, rouge pour le droit, grenat pour la médecine, vermillon pour les sciences, vert pour la pharmacie. Le béret apparaît pour la première fois au Quartier latin le lundi 15 janvier 1889, lors d'un monôme."
        },
        {
          "t": "p",
          "html": "Le succès est immédiat et incontrôlable. Moqué par une partie de la presse, le béret est aussitôt copié par d'autres corporations et, mêlé aux manifestations anti-boulangistes, se voit même cantonné au seul Quartier latin par un arrêté du préfet de police du 9 février 1889. Pour ne pas se le faire confisquer, l'« A » dépose le modèle et en réserve le port à ses adhérents. On envisage un temps de l'abandonner au profit d'une simple rosette mais l'association choisit de résister. Réunie au Paradis Latin le 17 mars, elle convoque une cinquantaine de chapeliers, et le dimanche 31 mars 1889 — jour de l'inauguration de la Tour Eiffel — arrête le modèle définitif : un béret de velours noir, un ruban de soie mi-bleu mi-rouge aux couleurs de Paris, un écusson aux armes de la ville surmonté des palmes académiques, le tout tenu par des passants."
        },
        {
          "t": "h3",
          "text": "La diffusion en province (1889-1891)"
        },
        {
          "t": "img",
          "src": "https://commons.wikimedia.org/wiki/Special:FilePath/Au%20Quartier%20Latin%20Mi-Car%C3%AAme%201896.jpg",
          "alt": "Au Quartier latin, Mi-Carême 1896",
          "caption": "Au Quartier latin pendant la Mi-Carême, en 1896 : la coiffe étudiante est déjà partout dans les cortèges.",
          "credit": "Wikimedia Commons",
          "align": "right",
          "width": 330
        },
        {
          "t": "p",
          "html": "Soutenues par les autorités universitaires, les AGE de province se constituent à leur tour et adoptent une coiffe, souvent en la distinguant de celle de Paris. Aix officialise son béret le 16 février 1889 ; Toulouse le porte à la même époque et y ajoute une rosette d'étudiant ; Lyon l'orne d'un lion brodé dès août 1889 ; Bordeaux opte pour trois croissants de lune entrelacés ; Nancy adopte un béret au blason de la ville en cannetille."
        },
        {
          "t": "p",
          "html": "Pour accueillir les étudiants d'Europe lors du sixième centenaire de leur université (22-25 mai 1890), les Montpelliérains refusent le béret parisien et choisissent, dès le début de 1889, une coiffe rappelant la barrette — la toque de docteur médiévale que l'on voit sur les portraits de Rabelais. C'est la fameuse faluche à crevés, conservée jusqu'à aujourd'hui par Montpellier et, par filiation, par Nîmes. Le récit de ces fêtes, présidées par le président de la République Sadi Carnot qui remit solennellement son drapeau à l'AGE de Montpellier, confirme cette adoption précoce : une photographie instantanée prise lors de l'excursion à Aigues-Mortes, le 26 mai, montre déjà des Montpelliérains coiffés de la faluche à crevés aux côtés de camarades portant la faluche à fond plein — toutes de grande taille et, à l'époque, vierges d'insignes et de rubans."
        },
        {
          "t": "p",
          "html": "La symbolique des insignes, elle, ne vient pas de France mais de Belgique. À Gand, dès 1873, les étudiants distinguent leurs casquettes par des insignes brodés de fil doré, plus tard estampés — un usage emprunté à l'armée ; l'étoile marquant les années d'études y est attestée vers 1900. Par les liens étroits entre Lillois et Belges, ces pratiques gagnent la France et se généralisent sur les bérets dans les années 1920. Quant au mot lui-même, il vient du patois du Nord, où la « faluche » désigne une galette : comme « galette » était déjà partout le surnom familier du béret, les Lillois l'ont naturellement appliqué au leur. Le terme s'impose dans les années 1930, à la faveur des congrès de l'UNEF ; et ce n'est qu'après la Seconde Guerre mondiale que la forme se stabilise dans toutes les villes, à deux exceptions fièrement conservées : les crevés de Montpellier et les passants de Strasbourg."
        },
        {
          "t": "h3",
          "text": "L'âge d'or international : Corda Fratres et l'UNEF"
        },
        {
          "t": "img",
          "src": "https://commons.wikimedia.org/wiki/Special:FilePath/Affiche%20pour%20les%20F%C3%AAtes%20du%20Congr%C3%A8s%20de%201907%20de%20la%20Corda%20Fratres%20%C3%A0%20Bordeaux.JPEG",
          "alt": "Affiche du congrès de la Corda Fratres à Bordeaux, 1907",
          "caption": "Affiche des fêtes du 5e congrès de la Corda Fratres à Bordeaux (1907), la fédération internationale des étudiants.",
          "credit": "Wikimedia Commons",
          "align": "right",
          "width": 280
        },
        {
          "t": "p",
          "html": "Dès le 10 août 1889, une conférence tenue à Paris lance l'idée d'une fédération internationale des étudiants, qui prend corps en 1898 sous le nom de <em>Corda Fratres</em> : forte de dizaines de milliers de membres sur cinq continents, elle a le français pour langue officielle, tient son 2e congrès à Paris en 1900 — présidé en faluche — et son 5e à Bordeaux en 1907. La même année 1907, les Associations générales de Bordeaux, Dijon, Lille et Lyon fondent l'UNAGEF à Lille, ancêtre de l'UNEF ; Paris ne les rejoint qu'en 1909. Le mouvement étudiant prend alors une forme associative au sens de la loi de 1901, faute de pouvoir invoquer le droit syndical, réservé depuis 1884 aux seuls salariés."
        },
        {
          "t": "h3",
          "text": "Strasbourg et l'Alsace (1909)"
        },
        {
          "t": "img",
          "src": "https://commons.wikimedia.org/wiki/Special:FilePath/Arriv%C3%A9e%20des%20%C3%A9tudiants%20de%20Strasbourg%20%C3%A0%20Paris%20en%201919.jpg",
          "alt": "Arrivée des étudiants de Strasbourg à Paris en 1919",
          "caption": "Arrivée des étudiants de Strasbourg à Paris en 1919 : à la Libération de l'Alsace, ce sont eux qui réaffichent les premiers la faluche.",
          "credit": "Wikimedia Commons",
          "align": "left",
          "width": 360
        },
        {
          "t": "p",
          "html": "L'Alsace étant allemande depuis 1871, l'Université de Strasbourg, devenue Kaiser-Wilhelm-Universität, est soumise aux folklores germaniques. En 1909, lors d'un congrès de pharmaciens tenu à Nancy en marge du 3e congrès de l'UNEF, des étudiants alsaciens francophiles de l'association H2S reçoivent en cadeau une faluche commandée au chapelier nancéien. Ils la rapportent en Alsace en signe de ralliement aux idées françaises, au péril de leur liberté — son port y étant interdit sous l'Empire allemand. C'est de Nancy que Strasbourg tient ses fameux passants. À la libération de 1918, ce sont ces mêmes étudiants qui, les premiers, réaffichent la faluche, symbole du retour de l'Alsace à la France."
        },
        {
          "t": "h3",
          "text": "La Première Guerre mondiale et l'entre-deux-guerres"
        },
        {
          "t": "p",
          "html": "La mobilisation générale du 2 août 1914 décime la jeunesse étudiante : on estime qu'un étudiant sur deux n'est pas revenu du front, et l'insouciance d'avant-guerre disparaît. De ce conflit, la faluche hérite toutefois ses premiers véritables insignes : les anciens combattants y reprennent les insignes de spécialité et de régiment de l'armée, auxquels on prête peu à peu des significations plus légères. La coiffe renaît dans les Années folles, portée par une génération qui n'a pas connu les tranchées ; la multiplication des disciplines impose de nouveaux emblèmes. La crise de 1929 fait toutefois reculer le folklore : jugée « ringarde » et marque d'aisance bourgeoise, la faluche ne survit plus que dans les cercles associatifs. Le sursaut vient du cinquantenaire : en avril 1938, un charivari étudiant se mue en une semaine de liesse dans le Quartier latin, largement couverte par la presse, et l'on prend l'habitude d'en fêter l'anniversaire, encore en 1939 et même en 1940."
        },
        {
          "t": "h3",
          "text": "La Seconde Guerre mondiale"
        },
        {
          "t": "p",
          "html": "Le 11 novembre 1940, à l'appel des lycéens d'Henri-IV, étudiants et lycéens manifestent à Paris pour déposer une gerbe en forme de croix de Lorraine sur la tombe du Soldat inconnu ; l'occupant ouvre le feu et procède à des arrestations et des déportations. Le drame se concentre surtout autour de l'Université de Strasbourg, repliée à Clermont-Ferrand dès 1939. Majoritairement hostile au IIIe Reich, elle devient l'un des berceaux de la Résistance. Après plusieurs offensives allemandes, la rafle du 25 novembre 1943 frappe l'université clermontoise : sur quelque 1 200 personnes rassemblées, environ 130 sont déportées (la plaque commémorative fait état de 139 disparus). Beaucoup d'étudiants ont payé de leur vie leur attachement à la France libre — c'est cette mémoire que perpétue aujourd'hui encore le « ruban du souvenir » des faluchards strasbourgeois."
        },
        {
          "t": "h3",
          "text": "L'après-guerre et la Charte de Grenoble (1946)"
        },
        {
          "t": "p",
          "html": "La guerre a montré combien tout pouvait s'effacer : on prend alors acte que « les écrits restent ». Le premier code écrit connu paraît en 1946 dans le journal de l'AFGES, l'association fédérative générale des étudiants de Strasbourg. La même année, le 35e congrès de l'UNEF, réuni à Grenoble, adopte la Charte de Grenoble (24 avril 1946), texte fondateur qui définit l'étudiant comme « un jeune travailleur intellectuel » doté de droits et de devoirs, et fait de lui un acteur de la vie universitaire."
        },
        {
          "t": "h3",
          "text": "Mai 68 : la fracture"
        },
        {
          "t": "p",
          "html": "Les années 1960 marquent un point de rupture. Dans le climat contestataire de Mai 68, la jeunesse se politise massivement, souvent à l'extrême gauche, et rejette la faluche comme un symbole « passéiste » ; des heurts opposent même faluchards corporatistes, syndicalistes et faluchards de droite. La coiffe disparaît des amphithéâtres et ne survit que dans les filières longues et fortement corporatistes telles que la médecine, la pharmacie et le droit. De cette crise naît un changement de statut décisif : la faluche cesse d'être « l'uniforme de l'étudiant » pour devenir « une tradition du monde étudiant »."
        },
        {
          "t": "h3",
          "text": "Le renouveau (années 1970-1980)"
        },
        {
          "t": "p",
          "html": "Le retour de la faluche vient d'où on ne l'attendait pas : non des faluchards eux-mêmes, mais des Basochards de Poitiers, confrérie d'étudiants en droit. Autour de « Didier Ier », élu roi du Royaume de Basoche en 1976, une bande de joyeux lurons multiplie les canulars retentissants entre 1976 et 1979 — jusqu'à se faire inviter au sacre de l'empereur Bokassa ou à visiter l'Élysée de nuit —, remettant la coiffe et le monde étudiant sous les projecteurs. La résurrection proprement dite est ensuite l'œuvre d'étudiants en médecine, en pharmacie et en sciences."
        },
        {
          "t": "h3",
          "text": "Le code de la faluche : de l'oral à l'écrit"
        },
        {
          "t": "p",
          "html": "Pendant longtemps, la faluche n'a pas eu de code écrit : la coutume se transmettait oralement. Quelques principes suffisaient — couleur du bandeau selon la discipline, insignes selon la faculté, étoiles dorées ou argentées pour les années. Les premières transcriptions datent des années 1960, avec deux codes dominants : un code toulousain, paru dans le <em>Midi Étudiant</em> en mars 1966, rédigé en articles à la manière d'un code de droit, et un code lillois, paru dans le journal <em>MIL</em> en 1975-1976, reconstitué auprès du commerçant qui vendait les faluches aux Lillois. Des codes lyonnais et strasbourgeois ont aussi existé ; Montpellier, qui n'avait qu'un seul fabricant, n'a laissé aucun code écrit."
        },
        {
          "t": "p",
          "html": "Le 8 mars 1976, à Lille, ces traditions sont fondues en une synthèse fondée sur le code toulousain, jugé le plus complet : elle réserve le velours aux disciplines de santé et le satin aux autres, fait passer au bleu le ruban accessoire de la première étoile, et fait adopter à la médecine le caducée (l'ancienne tête de mort sur fémurs devenant l'emblème de la première année commune). En décembre 1986, à Toulouse, le code précise pour la première fois la date de création de la faluche, introduit la notion de Grand Maître et se veut national en intégrant la faluche montpelliéraine. La rédaction du centenaire à Reims, plus lisible, s'imposera ensuite."
        },
        {
          "t": "p",
          "html": "L'analyse comparée des rédactions successives, menée par Isabelle Fayemendy, montre une coiffe vivante. Le code de 1966 ne décrit guère que l'emblème de discipline, les étoiles, les palmes et la lettre du bac ; les insignes y sont encore rares. Celui du centenaire de 1988 intègre le code montpelliérain et le rôle du Grand Maître, code les lettres du bac de A à T et voit « exploser » les insignes du velours — cochon, bouteilles, chameau, pendu, lime, potager. La version de 1998 simplifie l'ensemble, introduit les initiales et la quille et ouvre largement les filières (sage-femme, STAPS, IUT, œnologie). Celle de 2009 ajoute un court historique, distingue nettement velours et circulaire, prévoit le bac international et le drapeau pour une année à l'étranger, et crée des insignes liés au respect du code — pachyderme, singe, mammouth."
        },
        {
          "t": "h3",
          "text": "Fabricants"
        },
        {
          "t": "p",
          "html": "La faluche n'a jamais eu de fabricant unique, et la géographie des chapeliers explique en partie la diversité des coutures : la maison Groff réalise à la main les fonds « crevés » de Montpellier ; la maison Legrand, à Tours, fournit les carabins et potards tourangeaux ainsi que les Rémois ; la maison Ball, à Strasbourg, livre des faluches doublées à passants ; la chapellerie Jean, à Roubaix, produit la « lilloise » — mécanisée, doublée et bordée de cuir, la mieux adaptée au potager comme au budget étudiant. Les insignes, longtemps affaire d'artisans, ont surtout été émaillés par la maison Delande puis estampés, depuis 1925, par la maison Mourgeon, encore aujourd'hui la principale source."
        },
        {
          "t": "h3",
          "text": "Le blason de Paris"
        },
        {
          "t": "img",
          "src": "https://commons.wikimedia.org/wiki/Special:FilePath/Grandes%20Armes%20de%20Paris.svg",
          "alt": "Grandes armes de la ville de Paris",
          "caption": "Les grandes armes de Paris : « De gueules à la nef équipée d'argent voguant sur des ondes du même ; au chef d'azur semé de fleurs de lys d'or. »",
          "credit": "Wikimedia Commons (CC BY-SA)",
          "align": "left",
          "width": 250
        },
        {
          "t": "p",
          "html": "Sa version complète se blasonne ainsi : <em>« De gueules à la nef antique équipée d'argent voguant sur une onde du même ; au chef d'azur semé de fleurs de lys d'or, l'écu sommé d'une couronne murale à quatre tours d'or, portant la devise </em>Fluctuat nec mergitur<em>, accosté de deux branches de sinople — chêne et laurier — liées de gueules, auxquelles sont appendues l'étoile de la Légion d'honneur, la croix de la Libération et la croix de guerre. »</em> En lecture héraldique, le chef se lit en dernier, car il fut ajouté après la création du blason."
        },
        {
          "t": "p",
          "html": "Les couleurs racontent l'histoire de la ville. Le bleu et le rouge sont ceux du chaperon qu'Étienne Marcel, prévôt des marchands, fit porter à ses partisans lorsqu'il se révolta contre le dauphin Charles (futur Charles V) en 1358, dans la lutte pour le contrôle de Paris. Le bleu renvoie aussi à la Seine et à la couleur de la Vierge et des saintes qui lui sont rattachées — dont sainte Geneviève, patronne de Paris, qui avait prédit que les Huns n'atteindraient pas la ville et qu'il ne fallait pas fuir : la nef est l'un de ses attributs. Le rouge évoque enfin le sang de saint Denis, premier évêque de Paris, décapité et remontant, selon la légende, de Montmartre vers la future basilique. La nef d'argent, elle, rappelle la puissante corporation des Nautes, les marchands de l'eau qui firent la fortune de Paris."
        },
        {
          "t": "p",
          "html": "Le chef d'azur semé de fleurs de lys est un ajout de Charles V : après la mort d'Étienne Marcel, le roi entendait renforcer son emprise sur la ville, rendre hommage à la dynastie capétienne et invoquer la Sainte Trinité. La couronne murale qui somme l'écu porte quatre tours, marque d'une ville fortifiée. La confusion fréquente entre quatre et cinq tours vient de Napoléon Ier, qui voulut distinguer les villes (trois tours), les chefs-lieux (quatre) et les capitales (cinq) ; mais la lecture héraldique parisienne, déjà fixée à quatre tours, a été conservée — d'où des versions à cinq tours que l'on rencontre parfois."
        },
        {
          "t": "p",
          "html": "Le blason a connu de nombreuses métamorphoses avant d'être stabilisé. Fixé une première fois en 1412, il est remplacé en 1792 par les couleurs de Lafayette et Bailly ; en 1811, les fleurs de lys cèdent la place à des abeilles impériales et une déesse Isis est placée à la proue de la nef ; en 1817, la Restauration rétablit les fleurs de lys et transforme la modeste nef en navire de haut bord ; en 1848, le chef fleurdelisé devient un semé d'étoiles et la nef prend l'allure d'un bateau-lavoir, alors répandu sur la Seine ; en 1853, sous le Second Empire, Napoléon III rétablit le chef fleurdelisé de France. Après la guerre de 1870, Edgar Quinet aurait même suggéré d'ajouter un pigeon, en hommage aux services rendus par les pigeons voyageurs durant le siège de Paris. En 1924, les fleurs de lys sont transformées en piques de grilles, la nef paraît sombrer et la figuration des ondes est interrompue vers la pointe — c'est de cette maladresse que vient l'eau peinte en bleu, et non en argent comme le veut l'héraldique. Enfin, l'arrêté préfectoral du 20 juin 1942 entérine les travaux de la commission d'héraldique urbaine de la Seine, qui reprend en le modernisant le sceau de 1412 ; le décret du 20 août 1949 fixe le blason dans la forme qu'on lui connaît."
        },
        {
          "t": "p",
          "html": "La devise <em>Fluctuat nec mergitur</em> — « il est battu par les flots mais ne sombre pas » — rappelle les inondations répétées auxquelles la capitale a survécu. Elle est plus récente qu'on ne le croit : jusqu'au XVe siècle, le sceau de Paris portait simplement la légende <em>Sigillum mercatorum aquæ Parisius</em> (« sceau des marchands de l'eau de Paris »), et la formule, qui apparaît sur quelques jetons municipaux dès la fin du XVIe siècle, n'était alors qu'une devise parmi d'autres. C'est le baron Haussmann, préfet de la Seine, qui en fait la devise officielle de la ville le 24 novembre 1853."
        },
        {
          "t": "p",
          "html": "Sous l'écu enfin, trois décorations décernées à la Ville de Paris. Au centre, la croix de la Légion d'honneur, remise par le président Émile Loubet à l'occasion de l'Exposition universelle et validée par les décrets des 9 octobre 1900 et 27 mars 1901. La croix de guerre 1914-1918, décernée sous la présidence de Raymond Poincaré par Georges Clemenceau, par citation à l'ordre de l'armée du 28 juillet 1919 puis décret du 14 février 1924. Et la croix de la Libération, décernée par le général de Gaulle (décret du 24 mars 1945) puis incorporée aux armoiries par le président Vincent Auriol, dont le décret du 20 août 1949 arrête l'ensemble. Le blason est accosté de deux rameaux : le chêne, symbole de la stabilité et de la résistance de Paris face aux assauts, et le laurier, de ses victoires et de son rayonnement. À côté de la lecture héraldique, stricte, circulent des lectures plus libres mais bien vivantes — le rouge du feu de la Commune ou du sang versé en 1870 et en 1945, ou la « cinquième tour perdue » au titre du déshonneur de l'Occupation : autant d'anecdotes qui ont leur place, à condition de ne pas les confondre avec le blasonnement officiel."
        }
      ]
    },

          "t": "p",
          "html": "Au-delà des couleurs, le code reconnaît six formes de coiffe, qui se distinguent par leur confection ou l'organisation du velours plutôt que par la couture."

        {
          "t": "kv",
          "items": [

          "caption": "Asclépios (Esculape), dieu de la médecine, appuyé sur son bâton entouré d'un serpent.",
          "credit": "Wikimedia Commons",
          "align": "left",
          "width": 230
        },
        {
          "t": "p",
          "html": "<strong>Le bâton d'Asclépios (médecine).</strong> L'emblème des carabins n'est pas, à proprement parler, un « caducée » : c'est un long bâton d'olivier autour duquel s'enroule un <em>unique</em> serpent. Asclépios (Esculape chez les Romains), fils d'Apollon et de la mortelle Coronis, fut élevé par le centaure Chiron qui lui enseigna la médecine, les drogues et la chirurgie. Devenu si habile qu'il ressuscitait les morts, il fut foudroyé par Zeus pour cette hérésie avant d'être élevé au rang de dieu. Le serpent figuré est la couleuvre d'Esculape (<em>Zamenis longissimus</em>)— grande, inoffensive, parfois albinos, et redoutable dératiseur à l'époque des grandes épidémies — élevée dans les temples de guérison comme Épidaure. En France, le bâton d'Asclépios représente le corps médical depuis le sceau de l'Université de Montpellier en 1605. On le surmonte souvent du miroir de la prudence (en écho au <em>primum non nocere</em>) et de palmes d'olivier (Asclépios) et de laurier (Apollon). Les palmes font également références aux études, anciennes, longues, difficiles et prestigieuse, ainsi qu'à la science"
        },
        {
          "t": "p",
          "html": "<strong>Le caducée d'Hermès (commerce, économie, kinésithérapie).</strong> C'est le seul véritable caducée : un bâton d'or où s'enroulent <em>deux</em> serpents affrontés, surmonté d'un vol (deux ailes). Il appartient à Hermès (Mercure), messager des dieux, dieu de l'éloquence, des voyageurs et des marchands… mais aussi des voleurs — si bien que le commerçant et le brigand priaient le même dieu. Marque des ambassadeurs, il orne la tribune de l'Assemblée nationale. Choisi pour le commerce et l'économie, il s'est étendu à la kinésithérapie par méconnaissance des symboles ; aux États-Unis, c'est lui qui représente — à tort — la médecine."
        },
        {
          "t": "p",
          "html": "<strong>La coupe d'Hygie (pharmacie).</strong> Une coupe autour de laquelle s'enroule un serpent dont la tête s'incurve vers le calice, comme pour s'y abreuver. Hygie, fille d'Asclépios et sœur de Panacée, est la déesse de la santé et de la propreté — son nom a donné le mot « hygiène ». Là où son père incarne la médecine magique, elle personnifie la connaissance des remèdes et la salubrité. C'est l'attribut officiel des pharmaciens français depuis 1942, en usage depuis 1820."

          "text": "François Rabelais (vers 1494-1553)"
        },
        {
          "t": "img",
          "src": "https://commons.wikimedia.org/wiki/Special:FilePath/Francois%20Rabelais%20-%20Portrait.jpg",
          "alt": "Portrait de François Rabelais",
          "caption": "François Rabelais, moine, médecin et écrivain : la figure tutélaire du folklore faluchard.",
          "credit": "Wikimedia Commons",
          "align": "right",
          "width": 240
        },
        {
          "t": "p",
          "html": "Né à La Devinière, près de Chinon, vers 1494, François Rabelais entrerait en noviciat vers la fin de 1510, d'abord au monastère des Cordeliers de la Baumette, construit devant la Maine près du roc de Chanzé à Angers. Il achève son noviciat chez les Cordeliers de Fontenay-le-Comte, passe par tous les degrés de la cléricature et reçoit les ordres vers 1520. Il s'adonne avec ferveur aux études et reçoit une formation de théologie. Devenu bénédictin, Rabelais s'attache à la personne de Geoffroy d'Estissac et devient son secrétaire. Il l'accompagne ainsi au cours des tournées d'inspection de ses terres et abbayes. Il séjourne ensuite au prieuré de Ligugé, résidence habituelle de Geoffroy d'Estissac. Rabelais ne se plie pas facilement aux règles monacales et ne reste pas cloîtré dans son monastère. Vers 1528, il prend l'habit de prêtre séculier pour se rendre dans diverses universités. Il écrit une lettre à Érasme dans laquelle il se déclare le fils spirituel de l'humaniste, en ce qu' il a voulu réconcilier la pensée païenne avec la pensée chrétienne, construisant ainsi ce qu'on a appelé l'Humanisme chrétien. Mais en même temps, Rabelais, pour écrire ses premiers textes, s'inspire directement du folklore et de la tradition orale populaire." 
        },
        {
          "t": "p",
           "html":"A Paris, entre 1524 et 1530, il commence ses études de médecine, vit en concubinage et devient père de 2 enfants. Le 17 septembre 1530, il s'inscrit à la Faculté de Médecine de Montpellier, où il donne des cours sur Hippocrate et Galien. Au printemps 1532, Rabelais s'installe à Lyon, grand centre culturel où fleurit le commerce de la librairie. Le 1er novembre, il est nommé médecin de l'Hôtel-Dieu de Notre-Dame de la Pitié du Pont-du-Rhône. Alors qu il se trouve dans la ville de Lyon, il souhaite la quitter pour repartir à Paris. Ses finances ne lui permettant pas de régler la note de l' aubergiste, il imagine alors un petit stratagème... Rabelais dépose alors dans sa chambre, bien en évidence, 2 sachets de sucre avec les inscriptions «poison pour le roi» «poison pour la reine». Il est rapidement arrêté et conduit à Paris par la maréchaussée. Le roi François Ier, informé des ruses de son ami, rit de cette farce, pardonna bien volontiers à Rabelais et paye l' aubergiste : ainsi naquit l' expression «le quart d' heure de Rabelais», qui désigne le désagréable moment où il faut régler une dette alors que l' on se trouve sans le sou."
        },
        {
          "t": "p",
          "html":"Rabelais publie Pantagruel en 1532 sous le pseudonyme d'Alcofribas Nasier (anagramme de François Rabelais). Après le succès de son premier ouvrage, il publie Gargantua en 1534, sous le même pseudonyme, utile précaution puisque tous ses livres sont ensuite condamnés par la Sorbonne. En 1534 paraissent à Lyon les Grandes et inévitables chroniques de l'énorme géant Gargantua, un recueil anonyme de contes populaires à la fois épiques et comiques. Ces contes tirent eux-mêmes leurs sources dans les romans de chevalerie du Moyen Âge, en particulier le cycle arthurien. Ce recueil obtient un grand succès et Rabelais se met alors à écrire un texte qui reprend la trame narrative des Chroniques. Fort du succès de Pantagruel, Rabelais entreprend de réécrire à sa façon l'histoire de Gargantua. S'écartant de ses sources populaires initiales, il rédige un Gargantua littérairement plus marqué d'humanisme que la première version. En 1540, François et Junie, les enfants bâtards de frère Rabelais, sont légitimés par Paul III. Le 19 septembre 1545, Rabelais obtient un privilège royal pour l' impression du Tiers Livre ; édité en 1546, Rabelais le signe de son propre nom mais le livre est aussitôt censuré pour hérésie. En mars 1546, Rabelais se retire à Metz chez Étienne Laurens, et est nommé médecin de la ville. Le 6 août 1550, Rabelais obtient du roi un privilège d'édition pour toutes ses œuvres, avec interdiction à quiconque de les imprimer ou de les modifier sans son consentement. Rabelais ne fut curé de Meudon que l'espace de 2 ans et il n' est pas sûr qu' il ait rempli jamais les fonctions curiales. La légende du curé de Meudon s est formée après coup. Le 1er mars 1552, le Quart livre est censuré par les théologiens. Le 7 janvier 1553, Rabelais résigne ses cures et il meurt à Paris en avril 1553." 
        },
        {
          "t": "h3",
          "text": "Bacchus (Dionysos)"
        },
        {
          "t": "img",
          "src": "https://commons.wikimedia.org/wiki/Special:FilePath/Dionysus%20bacchus-Kunsthistorisches%20Museum.jpg",
          "alt": "Statue de Dionysos (Bacchus)",
          "caption": "Dionysos (Bacchus), dieu du vin, de la fête et du théâtre.",
          "credit": "Wikimedia Commons",
          "align": "right",
          "width": 260
        },
        {
          "t": "p",
          "html": "Fils de Jupiter et de la mortelle Sémélé, Bacchus connaît une « double naissance » : Sémélé foudroyée, Zeus recoud l'enfant dans sa cuisse jusqu'au terme. Élevé loin de la colère de Junon, il parcourt le monde en enseignant la culture de la vigne, entouré de son cortège (le thiase) de ménades et de satyres. Dieu du vin, de la vigne, de la fête et de l'extase, il est aussi le dieu du théâtre — c'est de son culte que naît la tragédie grecque. Cette double nature, joie partagée et débordement, en fait le patron naturel du folklore festif. Dans la Faluche, il donne son nom à l'insigne qui récompense la « dignité dans l'ivresse » : savoir garder lucidité et tenue malgré l'alcool. Difficile à mériter, il est facile à perdre."
        },

          "t": "h3",
          "text": "Gambrinus"
        },
        {
          "t": "img",
          "src": "https://commons.wikimedia.org/wiki/Special:FilePath/Hans%20Makart%20-%20Gambrinus%20-%20Study%20for%20the%20Decorative%20Panel%20-%20O%201173%20-%20Slovak%20National%20Gallery.jpg",
          "alt": "Gambrinus, roi de la bière (étude de Hans Makart)",
          "caption": "Gambrinus, roi mythique de Flandre et de Brabant, patron des brasseurs (étude de Hans Makart).",
          "credit": "Wikimedia Commons",
          "align": "left",
          "width": 340
        },
        {
          "t": "p",
        "html":"Gambrinus (Jan primus), roi mythique de Flandre et Brabant, est un symbole des amateurs de bière. Dans les écritures historiques, il est souvent identifié comme Jean Ier de Brabant, duc de Brabant. On l'identifie aussi parfois à Jean sans Peur, duc de Bourgogne et comte de Flandre entre autres titres, ou encore à Jean IV de Brabant de la maison de Bourgogne. Gambrinus était aussi le nom d'un échanson de Charlemagne."
        },
        {
          "t": "p",
        "html":"Il représente la bonne humeur et la joie de vivre typique des zythophiles (amateurs de bière), en Belgique et dans les Flandres, mais aussi ailleurs en Europe. Dans plusieurs pays, il y a une longue tradition de folklore avec des poèmes sur le roi Gambrinus et la bière. Le poète allemand Burkard Waldis mentionne un certain Gambrivius qui aurait appris l'art de brasser de la déesse Isis, symbole de la fertilité. Une image de Gambrivius (1543) par Peter Flötner avec le poème de Burkard Waldis se trouve au British Museum. En Angleterre, on le chante au XVIIe siècle comme roi britannique, vivant 1700 ans av. J.-C.. La tradition arrive tard dans le sud de la France, où plusieurs établissements Gambrinus sont ouverts au milieu du XIXe siècle."   
        },
        {
          "t": "p",
        "html":"Selon la légende, Gambrinus habitait une petite ville des Flandres françaises, où il exerçait le métier de carillonneur. Il était amoureux de Flandrine, la fille de son maître, qui était verrier ; mais Flandrine n’était pas amoureuse de lui. Il se mit à trembler, au point de ne plus pouvoir jouer, et les habitants de Fresnes le mirent en prison pour tapage nocturne après l’avoir insulté et roué de coups. Quand il fut libéré il voulut se suicider, mais le diable lui proposa d'oublier Flandrine en échange de son âme qu'il viendrait chercher trente ans plus tard. Gambrinus accepta le pacte. Il s'enrichit par des jeux d’argent, mais il n’avait toujours pas oublié la fille du verrier."
        },
        {
          "t": "p",
        "html":"Il rencontra de nouveau le diable, qui lui donna des graines pour planter du houblon et lui montra comment fabriquer un carillon auquel nul ne pourrait résister. Gambrinus organisa alors une fête où tous étaient conviés. Les habitants de Fresnes trouvèrent la bière fort amère. Gambrinus commença alors à jouer du carillon et tout le monde dansa jusqu'à épuisement. La vengeance de Gambrinus était accomplie. Mais les habitants se précipitèrent sur la bière pour se rafraîchir et se rendirent compte que plus on en buvait, plus elle était douce. La boisson se fit connaître au-delà des frontières du pays et le roi des Flandres, pour récompenser Gambrinus de ce succès, le nomma duc, comte et seigneur. Mais il préféra le titre de « Roi de la bière » que lui avaient donné les habitants de Fresnes. Peu de temps après, Flandrine se décida à lui parler, mais il ne l’avait pas reconnue et lui offrit à boire… il l’avait oubliée."
        },
        {
          "t": "p",
        "html":"Lorsque les trente années furent passées et que le diable revint, Gambrinus joua du carillon jusqu’à ce que le diable trouve cela insupportable et disparaisse sans demander son reste. Gambrinus vécut heureux cent ans encore, tout en continuant à boire de la bière et à jouer du carillon. Lorsqu’il mourut, on retrouva à sa place un tonneau de bière : c’est pourquoi il n’a pas de tombe."
        },
        {
          "t": "h3",
          "text": "L'origine du potager"
        },
        {
          "t": "p",
          "html": "La tradition relie le potager aux « logeuses » chez qui les étudiants étaient hébergés : elles préparaient la soupe du soir, à base de pommes de terre (ce qui expliquerait leur absence du potager), tandis que les étudiants apportaient les autres légumes — carottes, poireaux, navets. Ne pouvant évoquer leurs aventures à table, ils auraient pris l'habitude de les coder par un légume. On a longtemps cité un passage de la revue <em>Scapin</em> (juillet 1933) comme plus ancienne trace écrite, mais Manuel Segura a corrigé cette lecture : le « poireau » y désigne le surnom familier d'une décoration officielle (les palmes académiques), non l'insigne intime. La codification du potager est en réalité plus tardive : on la trouve, sous l'article IX, dans le code carabin toulousain de la fin des années 1960."
        }

    switch(b.t){
      case "p":    return "<p class=\""+sc.trim()+"\">"+b.html+"</p>";
      case "h3":   return "<h3 class=\"sub\">"+b.text+"</h3>";
      case "note": return "<div class=\"note"+sc+"\">"+b.html+"</div>";
      case "img":  return img(b);
      case "imgrow": return "<div class=\"imgrow\">"+b.items.map(galleryFig).join("")+"</div>";
      case "list": return "<ul>"+b.items.map(function(i){return "<li class=\""+sc.trim()+"\">"+i+"</li>";}).join("")+"</ul>";
      case "kv":   return "<dl class=\"kv\">"+b.items.map(function(p){return "<div class=\"kv-row"+sc+"\"><dt>"+p[0]+"</dt><dd>"+p[1]+"</dd></div>";}).join("")+"</dl>";
      case "table":return "<div class=\"tablewrap"+(b.wide?" wide":"")+"\"><table><thead><tr>"+b.head.map(function(h){return "<th>"+h+"</th>";}).join("")+"</tr></thead><tbody>"+
                   b.rows.map(function(r){return "<tr class=\""+sc.trim()+"\">"+r.map(function(c,k){return "<td"+(k===0?" class=\"c0\"":"")+">"+c+"</td>";}).join("")+"</tr>";}).join("")+"</tbody></table></div>";
      case "accordion": return "<div class=\"accordion\">"+b.items.map(function(it){
                   return "<details class=\"acc searchable\"><summary><span class=\"acc-t\">"+it.title+"</span>"+(it.sub?"<span class=\"acc-s\">"+it.sub+"</span>":"")+"</summary><div class=\"acc-body\">"+it.blocks.map(function(bb){return block(bb,true);}).join("")+"</div></details>";}).join("")+"</div>";
      default: return "";
    }
  }
  document.getElementById("title").innerHTML = D.title || "";
  document.getElementById("subtitle").textContent = D.subtitle || "";
  document.getElementById("meta").textContent = D.updated || "";
  document.title = (D.title||"")+" — archive";
  var nav = document.getElementById("nav"), main = document.getElementById("main");
  (D.sections||[]).forEach(function(s){
    nav.insertAdjacentHTML("beforeend","<li><a href=\"#"+s.id+"\">"+s.title+"</a></li>");
    var html = "<article class=\"section\" id=\""+s.id+"\"><div class=\"eyebrow\">Section</div><h2>"+s.title+"</h2>"+
               (s.intro?"<p class=\"searchable\">"+s.intro+"</p>":"")+ (s.blocks||[]).map(function(b){return block(b,false);}).join("") +"</article>";
    main.insertAdjacentHTML("beforeend", html);
  });
  document.getElementById("foot").innerHTML = (D.title||"")+" &middot; archive documentaire &middot; "+(D.updated||"")+" — contenu editable dans data.js.";

  var q = document.getElementById("q"), count = document.getElementById("count");
  function norm(s){return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");}
  function run(){
    var v = norm(q.value.trim()); var total=0;
    document.querySelectorAll("article.section").forEach(function(sec){
      var hit=false;
      sec.querySelectorAll(".searchable").forEach(function(n){
        var m = v==="" || norm(n.textContent).indexOf(v)>-1;
        n.classList.toggle("hidden", !m);
        if(m){hit=true; total++;}
        if(n.classList.contains("acc")){ n.open = (v!=="" && m); }
      });
      sec.classList.toggle("hidden", v!=="" && !hit);
      var link = document.querySelector("nav.toc a[href='#"+sec.id+"']");
      if(link) link.parentElement.classList.toggle("hidden", v!=="" && !hit);
    });
    count.textContent = v==="" ? "" : (total ? total+" resultat"+(total>1?"s":"") : "Aucun resultat");
  }
  q.addEventListener("input", run);

  var links = [].slice.call(document.querySelectorAll("nav.toc a"));
  if("IntersectionObserver" in window){
    var obs = new IntersectionObserver(function(es){
      es.forEach(function(e){ if(e.isIntersecting){
        links.forEach(function(l){l.classList.toggle("active", l.getAttribute("href")==="#"+e.target.id);});
      }});
    },{rootMargin:"-20% 0px -70% 0px"});
    document.querySelectorAll("article.section").forEach(function(s){obs.observe(s);});
  }
})();
</script>
</body>
</html>
